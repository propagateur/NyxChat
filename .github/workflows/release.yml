name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            tor-script: powershell -ExecutionPolicy Bypass -File scripts/fetch-tor.ps1
            rust-targets: ''
            args: ''
          - os: macos-14
            label: macOS (Universal)
            tor-script: bash scripts/fetch-tor-macos-universal.sh
            rust-targets: 'x86_64-apple-darwin,aarch64-apple-darwin'
            args: '--target universal-apple-darwin'
          - os: ubuntu-22.04
            label: Linux
            tor-script: bash scripts/fetch-tor.sh
            rust-targets: ''
            args: ''

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --- Linux dependencies ---
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      # --- Fetch Tor binary ---
      - name: Fetch Tor Expert Bundle
        run: ${{ matrix.tor-script }}

      # --- Copy WebView2Loader.dll for Windows ---
      - name: Prepare WebView2Loader (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dll = "src-tauri/vendor/WebView2Loader.dll"
          if (-Not (Test-Path $dll)) {
            Write-Host "WebView2Loader.dll not found in vendor, skipping (webviewInstallMode embedBootstrapper will handle it)"
          }

      # --- Install & Build ---
      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Run AppImage tooling without FUSE on CI runners (fixes "failed to run linuxdeploy")
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'NyxChat ${{ github.ref_name }}'
          releaseBody: |
            ## NyxChat ${{ github.ref_name }}

            End-to-end encrypted peer-to-peer messenger — no server, no account.

            ### Downloads

            | Platform | File |
            |----------|------|
            | 🪟 Windows | `NyxChat_*_x64-setup.exe` / `.msi` |
            | 🍎 macOS (Intel + Apple Silicon) | `NyxChat_*_universal.dmg` |
            | 🐧 Linux | `NyxChat_*_amd64.deb` / `NyxChat-*.x86_64.rpm` |

            ### macOS: first launch

            The app is not signed with an Apple Developer ID, so macOS may say
            *"NyxChat is damaged and can't be opened"*. This is Gatekeeper
            quarantine, not a real problem. After moving NyxChat to Applications,
            run once in Terminal:

            ```bash
            xattr -dr com.apple.quarantine /Applications/NyxChat.app
            ```

            ### Changes
            - See the commits since the previous version for the full changelog.
          releaseDraft: false
          prerelease: false
